<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avalon Replay Frame</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<style>
:root {
  --bg1: #0c1424;
  --bg2: #070c18;
  --panel: #132238;
  --panel2: #0d1829;
  --border: #20314a;
  --accent: #51f6a5;
  --accent2: #ffdd57;
  --text: #e9f2ff;
  --muted: #a9bedc;
  --shadow: 0 6px 0 #0a0f19;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 960px; height: 540px; overflow: hidden;
  background: radial-gradient(circle at 20% 20%, #1b2c47 0%, var(--bg1) 45%, var(--bg2) 100%);
  color: var(--text);
  font-family: "Press Start 2P", monospace;
  image-rendering: pixelated;
  display: flex; flex-direction: column;
}
.header {
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  padding: 8px 14px;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 4px 0 #0a0f19;
  flex-shrink: 0; height: 44px;
}
.header-left { display: flex; gap: 8px; align-items: center; }
.header-label {
  background: linear-gradient(180deg, rgba(81,246,165,0.2), rgba(81,246,165,0.1));
  padding: 5px 10px; border-radius: 6px;
  border: 2px solid var(--border);
  font-size: 8px; color: var(--accent);
  box-shadow: 0 3px 0 #0a0f19;
}
.phase-badge {
  padding: 5px 10px; border-radius: 6px;
  border: 2px solid var(--border);
  font-size: 8px; box-shadow: 0 3px 0 #0a0f19;
}
.phase-team-selection { background: rgba(60,130,200,0.3); color: #7bc0ff; border-color: #3c82c8; }
.phase-team-voting    { background: rgba(200,160,40,0.3); color: #ffd966; border-color: #c8a028; }
.phase-quest-voting   { background: rgba(180,60,60,0.3); color: #ff9999; border-color: #b43c3c; }
.phase-assassination  { background: rgba(160,30,30,0.3); color: #ff7777; border-color: #a01e1e; }
.status-bar { display: flex; gap: 8px; align-items: center; font-size: 7px; color: var(--muted); }
.status-bar span {
  padding: 4px 8px; background: var(--panel2);
  border-radius: 5px; border: 1px solid var(--border);
}

.main { display: flex; flex: 1; overflow: hidden; }

.map-area {
  flex: 1.3; position: relative; overflow: hidden;
  background: var(--panel);
  border-right: 2px solid var(--border);
}
.table-scene {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 45% at 50% 48%, rgba(81,246,165,0.06) 0%, transparent 70%),
    linear-gradient(180deg, rgba(15,30,50,0.15), rgba(7,12,24,0.35) 60%, rgba(7,12,24,0.45));
}
.pixel-table {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 200px; height: 120px;
  background: linear-gradient(145deg, #3d2817, #2a1c10);
  border: 3px solid #1a1208; border-radius: 14px;
  box-shadow: 0 6px 0 #1a1208, inset 0 3px 0 rgba(255,221,87,0.1), 0 0 40px rgba(81,246,165,0.08);
}

.mission-bar {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: rgba(7,12,24,0.88);
  border: 2px solid var(--border); border-radius: 10px;
  box-shadow: 0 5px 0 #0a0f19, 0 0 20px rgba(81,246,165,0.08);
  z-index: 250;
}
.mission-node {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--panel2);
  border: 2px solid var(--border);
  box-shadow: 0 3px 0 #0a0f19;
  font-size: 10px; font-weight: bold; color: var(--muted);
}
.mission-node.success {
  background: rgba(81,246,165,0.18); border-color: var(--accent);
  box-shadow: 0 3px 0 #0a0f19, 0 0 12px rgba(81,246,165,0.35);
  color: var(--accent);
}
.mission-node.fail {
  background: rgba(255,87,87,0.14); border-color: #ff5757;
  box-shadow: 0 3px 0 #0a0f19, 0 0 12px rgba(255,87,87,0.35);
  color: #ff9ea0;
}
.mission-node.current {
  border-color: var(--accent2);
  box-shadow: 0 3px 0 #0a0f19, 0 0 12px rgba(255,221,87,0.3);
  color: var(--accent2);
}

.seat {
  position: absolute; width: 60px; height: 60px;
  border-radius: 50%; overflow: visible;
  border: 3px solid var(--border);
  box-shadow: 0 5px 0 #0a0f19;
  background: var(--panel2);
}
.seat.leader { border-color: var(--accent2); box-shadow: 0 5px 0 #0a0f19, 0 0 16px rgba(255,221,87,0.3); }
.seat.on-team { border-color: var(--accent); box-shadow: 0 5px 0 #0a0f19, 0 0 16px rgba(81,246,165,0.3); }

.seat-avatar {
  width: 100%; height: 100%; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: bold; color: #fff;
}
.seat .id-tag {
  position: absolute; top: -7px; left: -7px;
  font-size: 6px; color: #0a0f19;
  background: var(--accent2);
  padding: 2px 4px; border-radius: 3px;
  white-space: nowrap;
  border: 2px solid #0a0f19;
  box-shadow: 0 2px 0 rgba(10,15,25,0.5);
  z-index: 300; font-weight: bold;
}
.seat .role-tag {
  position: absolute; left: 50%; top: 62%;
  transform: translateX(-50%);
  padding: 2px 5px; border-radius: 5px;
  border: 2px solid #1a2d44;
  background: rgba(13,24,41,0.95);
  box-shadow: 0 2px 0 rgba(11,22,40,0.55);
  font-size: 6px; color: #cfe0ff;
  white-space: nowrap; z-index: 200;
}
.seat .role-tag.good { color: var(--accent); border-color: rgba(81,246,165,0.4); }
.seat .role-tag.evil { color: #ff9ea0; border-color: rgba(255,87,87,0.4); }
.seat .name-tag {
  position: absolute; bottom: -16px; left: 50%;
  transform: translateX(-50%);
  font-size: 6px; color: var(--accent);
  background: rgba(11,22,38,0.9);
  padding: 2px 5px; border-radius: 3px;
  white-space: nowrap;
  border: 1px solid var(--border);
  max-width: 110px; overflow: hidden; text-overflow: ellipsis;
}
.seat .crown {
  position: absolute; top: -14px; right: -4px;
  font-size: 12px; z-index: 300;
  filter: drop-shadow(0 2px 0 #0a0f19);
}

.sidebar {
  width: 340px; display: flex; flex-direction: column;
  background: var(--panel); flex-shrink: 0;
}
.panel-header {
  padding: 8px 12px;
  border-bottom: 2px solid var(--border);
  font-size: 9px; color: var(--accent2);
}
.actions-list {
  flex: 1; overflow-y: auto; padding: 8px 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.action-item {
  display: flex; gap: 8px; align-items: flex-start;
}
.action-avatar {
  flex-shrink: 0; width: 28px; height: 28px;
  border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold; color: #fff;
  border: 2px solid var(--border);
  box-shadow: 0 2px 0 #0a0f19;
}
.action-bubble {
  flex: 1; min-width: 0;
}
.action-sender {
  font-size: 7px; color: var(--accent2); font-weight: bold;
  margin-bottom: 2px;
}
.action-content {
  background: var(--panel2);
  border: 2px solid var(--border);
  border-radius: 0 8px 8px 8px;
  padding: 6px 8px; font-size: 7px;
  line-height: 1.5; color: var(--text);
  word-break: break-word; white-space: pre-wrap;
}

.reward-bar {
  padding: 6px 12px;
  border-top: 2px solid var(--border);
  background: var(--panel2);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 7px; flex-shrink: 0;
}
.reward-bar .step-info { color: var(--muted); }
.reward-bar .reward-info { color: var(--accent2); }
.reward-bar .total-info { color: var(--accent); }

.good-evil-score {
  position: absolute; bottom: 10px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 14px; align-items: center;
  padding: 5px 12px;
  background: rgba(7,12,24,0.88);
  border: 2px solid var(--border); border-radius: 8px;
  box-shadow: 0 4px 0 #0a0f19;
  font-size: 8px; z-index: 250;
}
.score-good { color: var(--accent); }
.score-evil { color: #ff9ea0; }
.score-sep { color: var(--muted); }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-label">AVALON</div>
    <div id="phase-badge" class="phase-badge"></div>
  </div>
  <div class="status-bar">
    <span id="quest-info"></span>
    <span id="round-info"></span>
    <span id="leader-info"></span>
  </div>
</div>
<div class="main">
  <div class="map-area">
    <div class="table-scene">
      <div class="pixel-table"></div>
      <div class="mission-bar" id="mission-bar"></div>
      <div id="seats"></div>
      <div class="good-evil-score" id="score-bar"></div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel-header">Actions</div>
    <div class="actions-list" id="actions-list"></div>
    <div class="reward-bar" id="reward-bar"></div>
  </div>
</div>

<script>
const PLAYER_COLORS = [
  '#4488ff', '#44cc88', '#ff5577', '#aa66ff', '#ff9944',
  '#44cccc', '#ff66aa', '#88bb44', '#cc8844', '#6688ff'
];

function renderFrame(data) {
  const phaseClasses = {
    'Team Selection': 'phase-team-selection',
    'Team Voting':    'phase-team-voting',
    'Quest Voting':   'phase-quest-voting',
    'Assassination':  'phase-assassination'
  };
  const badge = document.getElementById('phase-badge');
  badge.className = 'phase-badge ' + (phaseClasses[data.phase] || '');
  badge.textContent = data.phase || 'Unknown';

  document.getElementById('quest-info').textContent = 'Quest ' + (data.quest || 1) + '/5';
  document.getElementById('round-info').textContent = 'Round ' + (data.round || 1) + '/5';
  document.getElementById('leader-info').textContent = data.leader !== null && data.leader !== undefined
    ? 'Leader: P' + data.leader : '';

  const bar = document.getElementById('mission-bar');
  bar.innerHTML = '';
  const results = data.quest_results || [];
  const goodWins = results.filter(r => r === 'pass').length;
  const evilWins = results.filter(r => r === 'fail').length;
  for (let i = 0; i < 5; i++) {
    const node = document.createElement('div');
    node.className = 'mission-node';
    if (i < results.length) {
      node.classList.add(results[i] === 'pass' ? 'success' : 'fail');
      node.textContent = results[i] === 'pass' ? '✓' : '✗';
    } else if (i + 1 === (data.quest || 1)) {
      node.classList.add('current');
      node.textContent = String(i + 1);
    } else {
      node.textContent = String(i + 1);
    }
    bar.appendChild(node);
  }

  const scoreBar = document.getElementById('score-bar');
  scoreBar.innerHTML =
    '<span class="score-good">Good ' + goodWins + '</span>' +
    '<span class="score-sep">vs</span>' +
    '<span class="score-evil">Evil ' + evilWins + '</span>';

  const n = data.num_players || 5;
  const seatsEl = document.getElementById('seats');
  seatsEl.innerHTML = '';
  const mapArea = document.querySelector('.map-area');
  const cx = mapArea.offsetWidth / 2;
  const cy = (mapArea.offsetHeight / 2) + 8;
  const rx = Math.min(230, Math.max(140, mapArea.offsetWidth * 0.38));
  const ry = Math.min(150, Math.max(90, mapArea.offsetHeight * 0.36));
  const teamSet = new Set((data.proposed_team || []).map(Number));
  const roles = data.roles || [];

  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const x = cx + rx * Math.cos(angle) - 30;
    const y = cy + ry * Math.sin(angle) - 30;
    const seat = document.createElement('div');
    seat.className = 'seat';
    if (data.leader === i) seat.classList.add('leader');
    else if (teamSet.has(i)) seat.classList.add('on-team');

    const color = PLAYER_COLORS[i % PLAYER_COLORS.length];
    let roleHtml = '';
    if (roles[i]) {
      const isGood = roles[i].is_good;
      const cls = isGood ? 'good' : 'evil';
      roleHtml = '<div class="role-tag ' + cls + '">' + roles[i].name + '</div>';
    }
    let crownHtml = '';
    if (data.leader === i) crownHtml = '<div class="crown">👑</div>';

    seat.innerHTML =
      '<div class="seat-avatar" style="background:' + color + '">P' + i + '</div>' +
      '<span class="id-tag">P' + i + '</span>' +
      roleHtml + crownHtml;
    seat.style.left = x + 'px';
    seat.style.top = y + 'px';
    seatsEl.appendChild(seat);
  }

  const actionsEl = document.getElementById('actions-list');
  actionsEl.innerHTML = '';
  const actions = data.actions || {};
  const sortedKeys = Object.keys(actions).sort((a, b) => parseInt(a) - parseInt(b));
  for (const pid of sortedKeys) {
    const text = String(actions[pid]).substring(0, 200);
    const idx = parseInt(pid) || 0;
    const color = PLAYER_COLORS[idx % PLAYER_COLORS.length];
    const item = document.createElement('div');
    item.className = 'action-item';
    item.innerHTML =
      '<div class="action-avatar" style="background:' + color + '">P' + pid + '</div>' +
      '<div class="action-bubble">' +
        '<div class="action-sender">Player ' + pid + '</div>' +
        '<div class="action-content">' + escapeHtml(text) + '</div>' +
      '</div>';
    actionsEl.appendChild(item);
  }

  const rewardBar = document.getElementById('reward-bar');
  const rSign = (data.reward >= 0 ? '+' : '') + (data.reward || 0).toFixed(1);
  rewardBar.innerHTML =
    '<span class="step-info">Step ' + (data.step || 0) + '</span>' +
    '<span class="reward-info">Reward: ' + rSign + '</span>' +
    '<span class="total-info">Total: ' + (data.total_reward || 0).toFixed(1) + '</span>';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

if (window.FRAME_DATA) renderFrame(window.FRAME_DATA);
</script>
</body>
</html>
